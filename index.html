    <!DOCTYPE html>
    <html>
    <head>
    <title>Health Logger</title>
    <style>
    body{font-family:Arial;background:#eee;padding:20px}
    .box{background:#fff;padding:10px;margin:auto;width:300px;border:1px solid #ccc}
    input,button{margin:5px 0;padding:5px;width:100%}
    table{width:100%;margin-top:10px;border-collapse:collapse}
    td,th{border:1px solid #999;padding:5px;text-align:center}
    </style>
    </head>
    <body>

    <div class="box">
    <h3>Health Logger</h3>
    <input type="date" id="d">
    <input type="number" id="s" placeholder="Steps">
    <input type="number" id="sl" placeholder="Sleep(hrs)" step="0.1">
    <input type="number" id="w" placeholder="Water(L)" step="0.1">
    <button onclick="save()">Save</button>

    <table>
    <tr><th>Date</th><th>Steps</th><th>Sleep</th><th>Water</th><th>X</th></tr>
    <tbody id="t"></tbody>
    </table>
    </div>

    <script>
    d.valueAsDate=new Date();

    function g(){return JSON.parse(localStorage.logs||"[]")}
    function p(x){localStorage.logs=JSON.stringify(x)}

    function show(){
    let a=g(),h="";
    for(let i of a)h+=`<tr><td>${i.d}</td><td>${i.s}</td><td>${i.sl}</td><td>${i.w}</td>
    <td><button onclick="del('${i.d}')">X</button></td></tr>`;
    t.innerHTML=h;
    }

    function save(){
    let a=g(),x={d:d.value,s:s.value,sl:sl.value,w:w.value};
    let f=a.findIndex(e=>e.d==x.d);
    if(f>=0)a[f]=x;else a.push(x);
    p(a);show();
    s.value=sl.value=w.value="";
    d.valueAsDate=new Date();
    }

    function del(D){
    let a=g().filter(e=>e.d!=D);
    p(a);show();
    }

    show();
    </script>

    </body>
    </html>
